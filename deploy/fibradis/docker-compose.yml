# FIBRADIS — stack de producción
# Requiere que Traefik esté corriendo (deploy/traefik/)
# y la red traefik_public creada.
#
# Uso en el servidor:
#   cp .env.example .env && nano .env
#   docker compose up -d

services:
  api:
    image: ghcr.io/jorgebadillomx/fibradis:prod
    restart: always
    depends_on:
      sqlserver:
        condition: service_healthy
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - DatabaseProvider=SqlServer
      - ConnectionStrings__DefaultConnection=Server=sqlserver,1433;Database=${MSSQL_DB};User Id=${MSSQL_USER};Password=${MSSQL_PASSWORD};Encrypt=True;TrustServerCertificate=True;
      - Jwt__Secret=${JWT_SECRET}
      - Jwt__Issuer=fibradis
      - Jwt__Audience=fibradis-client
      - Jwt__AccessTokenMinutes=480
      - Hangfire__UseInMemoryStorage=false
      - Gemini__ApiKey=${GEMINI_API_KEY}
      - DeepSeek__ApiKey=${DEEPSEEK_API_KEY}
    networks:
      - traefik_public
      - internal
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.fibradis.rule=Host(`${DOMAIN}`) || Host(`www.${DOMAIN}`)"
      - "traefik.http.routers.fibradis.tls.certresolver=letsencrypt"
      - "traefik.http.services.fibradis.loadbalancer.server.port=8080"

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    restart: always
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=${MSSQL_PASSWORD}
      - MSSQL_PID=Express
    volumes:
      - sqldata:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -Q 'SELECT 1' -C -b"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - internal

volumes:
  sqldata:

networks:
  traefik_public:
    external: true
  internal:
    name: fibradis_internal
