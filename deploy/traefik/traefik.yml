entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
  websecure:
    address: ":443"

providers:
  docker:
    exposedByDefault: false
    network: traefik_public

certificatesResolvers:
  letsencrypt:
    acme:
      email: jorge.badillo@prototipo0.com
      storage: /acme.json
      httpChallenge:
        entryPoint: web

api:
  dashboard: false
