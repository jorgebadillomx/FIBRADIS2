<!doctype html>
<html lang="es-MX">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fibras Inmobiliarias</title>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6045003898585028" crossorigin="anonymous"></script>
    <!-- prerender-meta -->
    <script>
      (function() {
        var path = window.location.pathname.replace(/\/+$/, '') || '/';
        if (path === '/') {
          document.documentElement.setAttribute('data-home-shell', 'true');
        }
      })();
    </script>
    <noscript><style>#initial-home-shell { display: none; }</style></noscript>
    <style>
      html:not([data-home-shell="true"]) #initial-home-shell {
        display: none;
      }

      #initial-home-shell {
        position: fixed;
        inset: 0;
        z-index: 2147483647;
        background: #f8f3e8;
        color: #20342c;
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      #initial-home-shell .shell-header {
        display: flex;
        align-items: center;
        min-height: 3.5rem;
        border-bottom: 1px solid rgba(32, 52, 44, 0.14);
        padding: 0 1rem;
      }

      #initial-home-shell .shell-brand {
        color: #315f4e;
        font-family: Georgia, "Times New Roman", serif;
        font-size: 1.125rem;
        font-weight: 700;
        letter-spacing: -0.025em;
      }

      #initial-home-shell .shell-main {
        max-width: 72rem;
        margin: 0 auto;
        padding: 5rem 1rem 2rem;
      }

      #initial-home-shell h1 {
        max-width: 42rem;
        margin: 0;
        font-family: Georgia, "Times New Roman", serif;
        font-size: clamp(2.5rem, 10vw, 4.6rem);
        line-height: 0.98;
        letter-spacing: -0.045em;
      }

      #initial-home-shell em {
        color: #a66b22;
        font-style: normal;
      }

      #initial-home-shell p {
        max-width: 34rem;
        margin: 1rem 0 0;
        color: rgba(32, 52, 44, 0.72);
        font-size: 1.05rem;
        line-height: 1.65;
      }
    </style>
  </head>
  <body>
    <div id="initial-home-shell">
      <div class="shell-header">
        <div class="shell-brand">Fibras Inmobiliarias</div>
      </div>
      <main class="shell-main">
        <h1 aria-hidden="true">
          El universo de FIBRAs<br />
          <em>del mercado mexicano.</em>
        </h1>
        <p>
          Precios, fundamentales, distribuciones y noticias consolidadas en un solo lugar.
        </p>
      </main>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <!-- GTM diferido: se carga después del primer idle, no bloquea LCP -->
    <script>
      (function() {
        function loadGTM() {
          window.dataLayer = window.dataLayer || [];
          window.dataLayer.push({ 'gtm.start': new Date().getTime(), event: 'gtm.js' });
          var f = document.getElementsByTagName('script')[0];
          var j = document.createElement('script');
          j.async = true;
          j.src = 'https://www.googletagmanager.com/gtm.js?id=GTM-T44HV55';
          f.parentNode.insertBefore(j, f);
        }
        if ('requestIdleCallback' in window) {
          requestIdleCallback(loadGTM);
        } else {
          window.addEventListener('load', function() { setTimeout(loadGTM, 500); });
        }
      })();
    </script>
    <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-T44HV55"
      height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
  </body>
</html>
