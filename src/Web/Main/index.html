<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fibras Inmobiliarias</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossOrigin="anonymous" />
    <!-- Fonts non-blocking: página pinta con sistema font, web font swappea al cargar -->
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'" />
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" /></noscript>
    <!-- prerender-meta -->
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <!-- GTM diferido: se carga después del primer idle, no bloquea LCP -->
    <script>
      (function() {
        function loadGTM() {
          window.dataLayer = window.dataLayer || [];
          window.dataLayer.push({ 'gtm.start': new Date().getTime(), event: 'gtm.js' });
          var f = document.getElementsByTagName('script')[0];
          var j = document.createElement('script');
          j.async = true;
          j.src = 'https://www.googletagmanager.com/gtm.js?id=GTM-T44HV55';
          f.parentNode.insertBefore(j, f);
        }
        if ('requestIdleCallback' in window) {
          requestIdleCallback(loadGTM);
        } else {
          window.addEventListener('load', function() { setTimeout(loadGTM, 500); });
        }
      })();
    </script>
    <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-T44HV55"
      height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
  </body>
</html>
